_base_: ../base/base.yaml

experiment_name: sam2_hiera_s_frozen

model:
  family: sam2_semantic
  sam2:
    hf_model_id: facebook/sam2-hiera-small
    build_device: cpu
    feature_channels: 256
    decoder_channels: 256
    freeze_backbone: true
    lora:
      enabled: false
      target_modules: []
      rank: 8
      alpha: 16.0

optimizer:
  lr: 0.0001
